name: Refresh npm lock file

on:
  push:
    branches:
      - chore/professionalize-secure-repository

permissions:
  contents: write

jobs:
  refresh-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: chore/professionalize-secure-repository

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Refresh package lock
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit refreshed lock file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if git diff --cached --quiet; then
            echo "Lock file is already current."
            exit 0
          fi
          git commit -m "build: refresh npm lock file"
          git push
