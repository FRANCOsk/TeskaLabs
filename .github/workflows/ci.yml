name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build application
        run: npm run build

  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependency tree
        run: npm ci --ignore-scripts --no-audit --no-fund --silent

      - name: Create audit report
        id: audit
        shell: bash
        run: |
          set +e
          node scripts/audit-summary.mjs > npm-audit-summary.txt 2>&1
          status=$?
          cat npm-audit-summary.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-summary
          path: npm-audit-summary.txt
          if-no-files-found: error
          retention-days: 7

      - name: Enforce audit result
        if: steps.audit.outputs.status != '0'
        run: exit 1
